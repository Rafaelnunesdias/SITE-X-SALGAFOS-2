=<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Salgados - Portal do Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-hamburger"></i> X Salgados</h2>
        <p class="subtitle">Faça seu pedido diretamente para a nossa fábrica.</p>

        <form id="formPedido">
            <div class="form-group">
                <label for="nomeCliente"><i class="fas fa-user"></i> Seu Nome:</label>
                <input type="text" id="nomeCliente" placeholder="Ex: Professor Rafael" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-utensils"></i> Monte seu Pedido:</label>
                
                <div class="cardapio-lista">
                    <div class="menu-item" data-nome="Coxinhas Douradas">
                        <div class="item-info">
                            <span class="item-nome">Coxinhas Douradas</span>
                        </div>
                        <div class="item-controles">
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, -1)">-</button>
                            <input type="number" class="input-qtd" value="0" readonly>
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, 1)">+</button>
                        </div>
                    </div>

                    <div class="menu-item" data-nome="Hambúrguer Artesanal">
                        <div class="item-info">
                            <span class="item-nome">Hambúrguer Artesanal</span>
                        </div>
                        <div class="item-controles">
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, -1)">-</button>
                            <input type="number" class="input-qtd" value="0" readonly>
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, 1)">+</button>
                        </div>
                    </div>

                    <div class="menu-item" data-nome="Empadas de Frango">
                        <div class="item-info">
                            <span class="item-nome">Empadas de Frango</span>
                        </div>
                        <div class="item-controles">
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, -1)">-</button>
                            <input type="number" class="input-qtd" value="0" readonly>
                            <button type="button" class="btn-qtd" onclick="mudarQtd(this, 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit"><i class="fas fa-paper-plane"></i> Enviar Pedido</button>
        </form>

        <div id="telaSucesso">
            <div class="success-icon"><i class="fas fa-motorcycle"></i></div>
            <h3>Pedido a Caminho!</h3>
            <div id="infoPedidoGerado"></div>
            
            <div class="tracking-container">
                <div class="step active" id="step-1">
                    <div class="step-icon"><i class="fas fa-file-invoice"></i></div>
                    <div class="step-text">Pedido Recebido</div>
                </div>
                <div class="step" id="step-2">
                    <div class="step-icon"><i class="fas fa-fire-burner"></i></div>
                    <div class="step-text">Preparando (Cozinha)</div>
                </div>
                <div class="step" id="step-3">
                    <div class="step-icon"><i class="fas fa-box-open"></i></div>
                    <div class="step-text">Finalizando (Embalagem)</div>
                </div>
                <div class="step" id="step-4">
                    <div class="step-icon"><i class="fas fa-helmet-safety"></i></div>
                    <div class="step-text">Aguardando Motoboy</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
